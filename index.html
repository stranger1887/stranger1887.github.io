<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>정보 수업 포털 - 단원별 관리 모드</title>
    <style>
        :root { 
            --bg-body: #1e1e1e; 
            --bg-sidebar: #252526; 
            --bg-card: #333333; 
            --text-main: #cccccc; 
            --text-bright: #ffffff; 
            --primary: #007acc; 
        }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Malgun Gothic', sans-serif; display: flex; height: 100vh; background: var(--bg-body); color: var(--text-main); }
        
        /* 왼쪽 사이드바 메뉴 */
        #sidebar { width: 260px; background: var(--bg-sidebar); border-right: 1px solid #444; padding: 25px; flex-shrink: 0; }
        #sidebar h2 { font-size: 1.3rem; margin-bottom: 30px; text-align: center; color: var(--primary); cursor: pointer; }
        .menu-item { padding: 15px; cursor: pointer; border-radius: 8px; margin-bottom: 8px; transition: 0.3s; }
        .menu-item:hover { background: #3a3a3a; }
        .menu-item.active { background: var(--primary); color: white; }

        /* 오른쪽 메인 화면 영역 */
        #content { flex-grow: 1; padding: 50px; overflow-y: auto; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 30px; }
        
        /* 학습 도구 카드 스타일 */
        .card { background: var(--bg-card); border-radius: 15px; padding: 20px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid #444; text-decoration: none; display: block; }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 10px; margin-bottom: 15px; }
        .card h3 { color: var(--text-bright); margin: 10px 0 0 0; }
    </style>
</head>
<body>

<nav id="sidebar">
    <h2 onclick="showHome()">정보 수업</h2>
    <div class="menu-item" id="menu-unit1" onclick="loadUnit('unit1')">1단원: 디지털 리터러시</div>
    <div class="menu-item" id="menu-unit2" onclick="loadUnit('unit2')">2단원: 알고리즘과 프로그래밍</div>
</nav>

<main id="content">
    <h1 id="unit-title">학습 단원 선택</h1>
    <div class="grid-container" id="main-view">
        </div>
</main>

<script>
    // ★ 선생님이 말씀하신 경로로 정확히 맵핑했습니다!
    // ./단원폴더명/파일명.html 구조입니다.
    const data = {
        'unit1': { 
            title: '1단원: 디지털 리터러시', 
            tools: [
                { name: '국어 지문 타자 연습', icon: '⌨️', url: './unit1/typing.html', img: 'https://via.placeholder.com/250x150/007acc/fff?text=Typing+Practice' }
            ] 
        },
        'unit2': { 
            title: '2단원: 알고리즘과 프로그래밍', 
            tools: [
                { name: '구구단 알고리즘 설계', icon: '📐', url: './unit2/gugu.html', img: 'https://via.placeholder.com/250x150/ff9800/fff?text=Algorithm' }
            ] 
        }
    };

    function showHome() {
        document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
        document.getElementById('unit-title').innerText = "학습 단원 선택";
        const container = document.getElementById('main-view');
        
        container.innerHTML = `
            <div class="card" onclick="loadUnit('unit1')">
                <img src="https://via.placeholder.com/250x150/007acc/fff?text=Unit+1" alt="단원1">
                <h3>1단원: 디지털 리터러시</h3>
            </div>
            <div class="card" onclick="loadUnit('unit2')">
                <img src="https://via.placeholder.com/250x150/ff9800/fff?text=Unit+2" alt="단원2">
                <h3>2단원: 알고리즘과 프로그래밍</h3>
            </div>
        `;
    }

    function loadUnit(unitId) {
        document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
        const activeMenu = document.getElementById(`menu-${unitId}`);
        if(activeMenu) activeMenu.classList.add('active');

        const unit = data[unitId];
        document.getElementById('unit-title').innerText = unit.title;
        const container = document.getElementById('main-view');
        
        container.innerHTML = unit.tools.map(t => `
            <a href="${t.url}" class="card">
                <img src="${t.img}" alt="${t.name}">
                <h3 style="font-size: 1.1rem;">${t.icon} ${t.name}</h3>
            </a>
        `).join('');
    }

    showHome();
</script>
</body>
</html>
